<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Phase 1 Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #f0f0f0; font-family: 'Barlow', sans-serif; }
    input { font-family: inherit; }
    input:disabled { opacity: 0.4; cursor: not-allowed; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    input::placeholder { color: #444; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const DAYS = ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5 (Optional)"];
    const WEEKS = ["W1", "W2", "W3", "W4", "W5 (Deload)"];
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxrs9So7EjKeLQxtDS1dzbVRlT_dbHHj09kH0VvlQkU9_9xI72d_nBGuWVNc2ipBXoO/exec";

    const PROGRAM = {
      "Day 1": [
        { section: "WARM UP", name: "Ankle Mobility (knee-to-wall)", sets: 2, reps: "1 min/side", rpe: "—", cue: "Knee tracks over toe. Essential for landing mechanics." },
        { section: "WARM UP", name: "Tibialis Raises", sets: 3, reps: "15", rpe: "Burn", cue: "Burn the shins. Preps for deceleration." },
        { section: "WARM UP", name: "Iso Split Squat Hold", sets: 2, reps: "30s/leg", rpe: "Tension", cue: "Hold bottom of lunge. Hover knee 1 inch off floor." },
        { section: "WARM UP", name: "Single Leg Glute Bridge", sets: 2, reps: "12/side", rpe: "Activation", cue: "Squeeze glute hard at top. Wake it up." },
        { section: "PLYO", name: "Altitude Drop", sets: 3, reps: "6", rpe: "Tech", cue: "Step off → land → freeze. Silent landing, forefoot." },
        { section: "SQUAT", name: "Back Squat", sets: 4, reps: "6–8", rpe: "8", cue: "Tempo 2-0-1. Control down, fast up. Add 2.5kg when RPE drops to 7." },
        { section: "CALF", name: "Leg Press Calf Raise", sets: 4, reps: "10", rpe: "8–9", cue: "Explosive up, 3s down. Full stretch at bottom." },
        { section: "CALF", name: "Seated Calf Raise", sets: 3, reps: "12", rpe: "8–9", cue: "Soleus focus. Pause at stretch." },
        { section: "UNI", name: "Barbell Lunges", sets: 3, reps: "10/leg", rpe: "8", cue: "Catch yourself on the front foot. Controlled." },
        { section: "CORE", name: "Ab Wheel Rollout", sets: 3, reps: "10", rpe: "Quality", cue: "Glutes squeezed throughout. No back sag." },
      ],
      "Day 2": [
        { section: "WARM UP", name: "Band Pull-Aparts", sets: 2, reps: "20", rpe: "Activation", cue: "Palms up. Squeeze shoulder blades." },
        { section: "WARM UP", name: "Scapular Pull-ups", sets: 2, reps: "10", rpe: "Control", cue: "Hang from bar, shrug shoulders down/up." },
        { section: "WARM UP", name: "KB Halo", sets: 2, reps: "10", rpe: "—", cue: "Orbit the head. Loosen shoulders. ~20kg." },
        { section: "WARM UP", name: "Face Pulls (light)", sets: 2, reps: "15", rpe: "Burn", cue: "Pull to forehead. Rotate hands back." },
        { section: "PRESS", name: "Push Press", sets: 4, reps: "5–6", rpe: "8", cue: "Dip, drive, lockout. Leg power launches the bar." },
        { section: "ROW", name: "Pendlay Row", sets: 4, reps: "8", rpe: "8–9", cue: "Explosive pull from floor. Full reset each rep." },
        { section: "CHEST", name: "Incline DB Bench", sets: 3, reps: "10", rpe: "8", cue: "Control eccentric. Zero shaking on final set." },
        { section: "NECK", name: "Weighted Neck Flexion", sets: 3, reps: "12", rpe: "—", cue: "" },
        { section: "ARMS", name: "EZ Bar Curl", sets: 3, reps: "10–12", rpe: "8–9", cue: "" },
        { section: "ARMS", name: "Skullcrushers", sets: 3, reps: "10–12", rpe: "8–9", cue: "" },
        { section: "FINISHER", name: "Lu Raises", sets: 2, reps: "15", rpe: "Quality", cue: "" },
      ],
      "Day 3": [
        { section: "WARM UP", name: "Hip 90/90", sets: 2, reps: "1 min", rpe: "—", cue: "" },
        { section: "WARM UP", name: "Single Leg Glute Bridge", sets: 2, reps: "12/side", rpe: "Activation", cue: "" },
        { section: "WARM UP", name: "Lateral Lunges", sets: 2, reps: "8/side", rpe: "—", cue: "" },
        { section: "WARM UP", name: "Copenhagen Plank Hold", sets: 2, reps: "20-30s/side", rpe: "—", cue: "" },
        { section: "PLYO", name: "1-Leg Hop & Stick", sets: 3, reps: "5/leg", rpe: "Tech", cue: "" },
        { section: "HAMS", name: "Trap Bar Deadlift", sets: 4, reps: "5–6", rpe: "8.5", cue: "" },
        { section: "HINGE", name: "Good Mornings", sets: 3, reps: "10", rpe: "8", cue: "" },
        { section: "UNI", name: "Single Leg Press", sets: 3, reps: "10", rpe: "8", cue: "" },
        { section: "CARRY", name: "Pallof Press", sets: 3, reps: "12/side", rpe: "Quality", cue: "" },
        { section: "WARM UP", name: "Tibialis Raises (end)", sets: 3, reps: "20", rpe: "Burn", cue: "Pump the shins to finish." },
      ],
      "Day 4": [
        { section: "WARM UP", name: "Face Pulls", sets: 2, reps: "15", rpe: "Burn", cue: "" },
        { section: "WARM UP", name: "Scap Push-Ups", sets: 2, reps: "12", rpe: "Control", cue: "" },
        { section: "WARM UP", name: "Dead Hang", sets: 2, reps: "45s", rpe: "—", cue: "Full shoulder decompression. Grip work." },
        { section: "WARM UP", name: "Thread the Needle", sets: 2, reps: "5/side", rpe: "—", cue: "Thoracic rotation. Slow and controlled." },
        { section: "PRESS", name: "Close Grip Bench", sets: 4, reps: "6–8", rpe: "8.5", cue: "Hands shoulder-width. Elbows tucked. 1s pause." },
        { section: "PULL", name: "Lat Pulldown", sets: 3, reps: "12–15", rpe: "8–9", cue: "Full stretch at top. Squeeze hard at bottom." },
        { section: "ROW", name: "Bear Stance Row", sets: 3, reps: "10", rpe: "8.5", cue: "Isolate upper back. Squeeze hard at top." },
        { section: "NECK", name: "Weighted Neck Extension", sets: 3, reps: "12", rpe: "—", cue: "Plate on back of head. Look up. Slow eccentric." },
        { section: "ARMS", name: "Tricep Pushdown", sets: 3, reps: "14–16", rpe: "8–9", cue: "Rope attachment. Spread at bottom. Full extension." },
        { section: "ARMS", name: "Hammer Curls", sets: 3, reps: "10–12", rpe: "8–9", cue: "DBs. Brachialis focus. No swing." },
      ],
      "Day 5 (Optional)": [
        { section: "WARM UP", name: "Walking High Knees", sets: 2, reps: "10m", rpe: "Flow", cue: "Bring knee to chest. Dynamic stretch." },
        { section: "WARM UP", name: "Butt Kicks", sets: 2, reps: "10m", rpe: "Flow", cue: "Dynamic quad stretch." },
        { section: "WARM UP", name: "Side Shuffles", sets: 2, reps: "10m", rpe: "Flow", cue: "Stay low. Wake up hips." },
        { section: "WARM UP", name: "Static Calf Stretch", sets: 2, reps: "45s/side", rpe: "—", cue: "Lean into wall. Both straight and bent knee." },
        { section: "CARRY", name: "Jog / Walk Intervals", sets: 6, reps: "3 min", rpe: "5", cue: "1 min jog / 2 min walk. Grass/turf. Cleats." },
        { section: "CARRY", name: "Backward Sled Drag", sets: 3, reps: "20m", rpe: "9 (legs)", cue: "Lean back. Burn the quads. Zero Achilles impact." },
        { section: "CARRY", name: "Lateral Sled Drag", sets: 2, reps: "15m/side", rpe: "6", cue: "Adductor health. Cross feet over." },
        { section: "WARM UP", name: "Tibialis Raises (finisher)", sets: 3, reps: "20", rpe: "Burn", cue: "Pump the shins to finish." },
      ],
    };

    const SECTION_COLORS = {
      "WARM UP": "#4b5563", "PLYO": "#7c3aed", "SQUAT": "#d97706",
      "HAMS": "#d97706", "HINGE": "#d97706", "UNI": "#d97706",
      "CALF": "#b45309", "CORE": "#059669", "PRESS": "#dc2626",
      "ROW": "#2563eb", "CHEST": "#db2777", "PULL": "#2563eb",
      "NECK": "#6b7280", "ARMS": "#7c3aed", "FINISHER": "#059669",
      "CARRY": "#0891b2",
    };

    const STORAGE_KEY = "phase1-tracker-v1";
    const TYPES_KEY = "phase1-types-v1";

    // Returns the weight logged in the most recent previous week
    function getPrevWeight(weights, day, exercise, currentWeek) {
      const weekIdx = WEEKS.indexOf(currentWeek);
      if (weekIdx <= 0) return null;
      for (let i = weekIdx - 1; i >= 0; i--) {
        const w = weights[`${day}||${exercise}`]?.[WEEKS[i]]?.weight;
        if (w) return { weight: w, week: WEEKS[i] };
      }
      return null;
    }

    const TYPE_OPTIONS = [
      { id: "bb",  label: "BB",  title: "Barbell" },
      { id: "db",  label: "DB",  title: "Dumbbell" },
      { id: "bw",  label: "BW",  title: "Bodyweight" },
    ];

    function TypeToggle({ value, onChange }) {
      return (
        <div style={{ display: "flex", gap: 3 }}>
          {TYPE_OPTIONS.map(opt => {
            const active = value === opt.id;
            const isBW = opt.id === "bw";
            return (
              <button
                key={opt.id}
                title={opt.title}
                onClick={() => onChange(active ? null : opt.id)}
                style={{
                  background: active ? (isBW ? "#1a1a2a" : "#1a2020") : "#0d0d0d",
                  border: `1px solid ${active ? (isBW ? "#6366f1aa" : "#22c55e88") : "#2a2a2a"}`,
                  borderRadius: 5, cursor: "pointer", padding: "3px 7px",
                  color: active ? (isBW ? "#818cf8" : "#4ade80") : "#444",
                  fontFamily: "'Barlow Condensed', sans-serif",
                  fontWeight: 700, fontSize: 11, letterSpacing: "0.06em",
                  transition: "all 0.15s",
                }}
              >
                {opt.label}
              </button>
            );
          })}
        </div>
      );
    }

    function App() {
      const [activeDay, setActiveDay] = useState("Day 1");
      const [activeWeek, setActiveWeek] = useState("W1");
      const [weights, setWeights] = useState({});
      const [types, setTypes] = useState({});   // { "Day 1||Back Squat": "bb" | "db" | "bw" | null }
      const [expandedCue, setExpandedCue] = useState(null);
      const [saveStatus, setSaveStatus] = useState("");
      const [syncStatus, setSyncStatus] = useState("idle");

      useEffect(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) setWeights(JSON.parse(saved));
          const savedTypes = localStorage.getItem(TYPES_KEY);
          if (savedTypes) setTypes(JSON.parse(savedTypes));
        } catch (_) {}
      }, []);

      const save = useCallback((newWeights) => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(newWeights));
          setSaveStatus("saved");
          setTimeout(() => setSaveStatus(""), 1200);
        } catch (_) {}
      }, []);

      const saveTypes = useCallback((newTypes) => {
        try { localStorage.setItem(TYPES_KEY, JSON.stringify(newTypes)); } catch (_) {}
      }, []);

      const handleWeight = (day, exercise, value) => {
        const key = `${day}||${exercise}`;
        const updated = {
          ...weights,
          [key]: { ...(weights[key] || {}), [activeWeek]: { ...(weights[key]?.[activeWeek] || {}), weight: value } }
        };
        setWeights(updated);
        save(updated);
      };

      const handleComment = (day, exercise, value) => {
        const key = `${day}||${exercise}`;
        const updated = {
          ...weights,
          [key]: { ...(weights[key] || {}), [activeWeek]: { ...(weights[key]?.[activeWeek] || {}), comment: value } }
        };
        setWeights(updated);
        save(updated);
      };

      const handleType = (day, exercise, typeVal) => {
        const key = `${day}||${exercise}`;
        const updated = { ...types, [key]: typeVal };
        setTypes(updated);
        saveTypes(updated);
        // If switching to BW, clear the weight input for current week
        if (typeVal === "bw") {
          handleWeight(day, exercise, "");
        }
      };

      const getVal = (day, exercise, field) =>
        weights[`${day}||${exercise}`]?.[activeWeek]?.[field] || "";

      const getType = (day, exercise) =>
        types[`${day}||${exercise}`] || null;

      const syncToSheets = async () => {
        setSyncStatus("syncing");
        const today = new Date().toISOString().split("T")[0];
        const rows = [];
        for (const day of DAYS) {
          const exercises = PROGRAM[day] || [];
          for (const ex of exercises) {
            for (const week of WEEKS) {
              const key = `${day}||${ex.name}`;
              const w = weights[key]?.[week]?.weight;
              const note = weights[key]?.[week]?.comment || "";
              const t = types[key] || "";
              if (w) {
                rows.push({
                  date: today, week, day,
                  section: ex.section, exercise: ex.name,
                  sets: ex.sets, reps: ex.reps,
                  weight: w, type: t, notes: note,
                });
              }
            }
          }
        }
        if (rows.length === 0) {
          setSyncStatus("empty");
          setTimeout(() => setSyncStatus("idle"), 2500);
          return;
        }
        try {
          await fetch(SHEETS_URL, {
            method: "POST", mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rows }),
          });
          setSyncStatus("ok");
          setTimeout(() => setSyncStatus("idle"), 3000);
        } catch (_) {
          setSyncStatus("error");
          setTimeout(() => setSyncStatus("idle"), 3000);
        }
      };

      const exercises = PROGRAM[activeDay] || [];
      const sections = [...new Set(exercises.map(e => e.section))];
      const workingExercises = exercises.filter(e => e.section !== "WARM UP");
      const loggedCount = workingExercises.filter(e => getVal(activeDay, e.name, "weight") || getType(activeDay, e.name) === "bw").length;

      const syncStyles = {
        idle:    { bg: "#1a2a1a", border: "#22c55e44", color: "#22c55e", label: "↑ Sync to Sheets" },
        syncing: { bg: "#1a2a1a", border: "#22c55e44", color: "#22c55e66", label: "Syncing..." },
        ok:      { bg: "#0a2a0a", border: "#22c55e",   color: "#22c55e", label: "✓ Synced!" },
        empty:   { bg: "#2a1a1a", border: "#dc262644", color: "#dc2626", label: "Nothing logged yet" },
        error:   { bg: "#2a1a1a", border: "#dc262644", color: "#dc2626", label: "Sync failed" },
      }[syncStatus];

      return (
        <div style={{ fontFamily: "'Barlow', sans-serif", background: "#0d0d0d", minHeight: "100vh", color: "#f0f0f0", paddingBottom: 80 }}>

          {/* Header */}
          <div style={{ background: "#111", borderBottom: "1px solid #222", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
            <div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 20, fontWeight: 700, letterSpacing: "0.05em", color: "#f59e0b" }}>PHASE 1 TRACKER</div>
              <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{loggedCount} / {workingExercises.length} working sets logged</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {saveStatus === "saved" && <div style={{ fontSize: 11, color: "#22c55e", fontFamily: "monospace" }}>✓ saved</div>}
              <button onClick={syncToSheets} disabled={syncStatus === "syncing"} style={{
                background: syncStyles.bg, border: `1px solid ${syncStyles.border}`,
                borderRadius: 7, cursor: syncStatus === "syncing" ? "default" : "pointer",
                padding: "7px 12px", color: syncStyles.color,
                fontFamily: "'Barlow Condensed', sans-serif",
                fontWeight: 600, fontSize: 12, letterSpacing: "0.04em",
                transition: "all 0.2s", whiteSpace: "nowrap"
              }}>
                {syncStyles.label}
              </button>
            </div>
          </div>

          {/* Week Tabs */}
          <div style={{ background: "#111", borderBottom: "1px solid #1a1a1a", padding: "0 16px", display: "flex", gap: 4, overflowX: "auto" }}>
            {WEEKS.map(w => (
              <button key={w} onClick={() => setActiveWeek(w)} style={{
                background: "none", border: "none", cursor: "pointer",
                padding: "10px 14px", fontSize: 12, fontWeight: 600, letterSpacing: "0.06em",
                fontFamily: "'Barlow Condensed', sans-serif",
                color: activeWeek === w ? "#f59e0b" : "#555",
                borderBottom: activeWeek === w ? "2px solid #f59e0b" : "2px solid transparent",
                whiteSpace: "nowrap"
              }}>
                {w === "W5 (Deload)" ? "W5 DELOAD" : w}
              </button>
            ))}
          </div>

          {/* Day Selector */}
          <div style={{ padding: "12px 16px", display: "flex", gap: 8, overflowX: "auto" }}>
            {DAYS.map(d => {
              const dayEx = PROGRAM[d] || [];
              const logged = dayEx.filter(e => getVal(d, e.name, "weight") || getType(d, e.name) === "bw").length;
              return (
                <button key={d} onClick={() => setActiveDay(d)} style={{
                  background: activeDay === d ? "#f59e0b" : "#1a1a1a",
                  border: `1px solid ${activeDay === d ? "#f59e0b" : "#2a2a2a"}`,
                  borderRadius: 8, cursor: "pointer", padding: "8px 14px",
                  color: activeDay === d ? "#000" : "#888",
                  fontFamily: "'Barlow Condensed', sans-serif",
                  fontWeight: 700, fontSize: 13, letterSpacing: "0.04em", whiteSpace: "nowrap", minWidth: 64
                }}>
                  <div>{d.split(" ").slice(0, 2).join(" ")}</div>
                  <div style={{ fontSize: 10, fontWeight: 500, opacity: 0.7, marginTop: 2 }}>{logged}/{dayEx.length}</div>
                </button>
              );
            })}
          </div>

          {/* Deload Banner */}
          {activeWeek === "W5 (Deload)" && (
            <div style={{ margin: "0 16px 16px", padding: "10px 14px", background: "#1a1400", border: "1px solid #f59e0b33", borderRadius: 8, fontSize: 12, color: "#c8960a", lineHeight: 1.5 }}>
              ⚡ <strong>DELOAD WEEK</strong> — Cut all loads 40–50%. 2 sets per exercise. RPE targets will feel easy. That is the point.
            </div>
          )}

          {/* Exercises */}
          <div style={{ padding: "0 16px" }}>
            {sections.map(section => {
              const sectionExercises = exercises.filter(e => e.section === section);
              const color = SECTION_COLORS[section] || "#888";
              return (
                <div key={section} style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                    <div style={{ width: 3, height: 16, background: color, borderRadius: 2 }} />
                    <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 11, letterSpacing: "0.12em", color }}>{section}</span>
                  </div>

                  {sectionExercises.map(ex => {
                    const wVal = getVal(activeDay, ex.name, "weight");
                    const cVal = getVal(activeDay, ex.name, "comment");
                    const exType = getType(activeDay, ex.name);
                    const isBW = exType === "bw";
                    const isExpanded = expandedCue === `${activeDay}||${ex.name}`;
                    const prev = getPrevWeight(weights, activeDay, ex.name, activeWeek);
                    const isLogged = wVal || isBW;

                    return (
                      <div key={ex.name} style={{
                        background: "#161616",
                        border: `1px solid ${isLogged ? "#2a2a1a" : "#1f1f1f"}`,
                        borderRadius: 10, marginBottom: 8,
                        boxShadow: isLogged ? `0 0 0 1px ${color}22` : "none"
                      }}>
                        <div style={{ padding: "12px 14px" }}>
                          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>

                            {/* Left: name + badges */}
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 14, fontWeight: 600, color: isLogged ? "#f0f0f0" : "#aaa", lineHeight: 1.3 }}>{ex.name}</div>
                              <div style={{ display: "flex", gap: 6, marginTop: 6, flexWrap: "wrap", alignItems: "center" }}>
                                <span style={{ fontSize: 11, color: "#555", background: "#1f1f1f", borderRadius: 4, padding: "2px 7px" }}>{ex.sets}×{ex.reps}</span>
                                <span style={{ fontSize: 11, color: "#555", background: "#1f1f1f", borderRadius: 4, padding: "2px 7px" }}>RPE {ex.rpe}</span>
                                {prev && (
                                  <span style={{ fontSize: 11, color: "#8b8b3a", background: "#1f1e10", borderRadius: 4, padding: "2px 7px" }}>
                                    {prev.week}: {prev.weight}{isBW ? "" : "kg"}
                                  </span>
                                )}
                              </div>
                            </div>

                            {/* Right: type toggle + weight input */}
                            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                              <input
                                type="text"
                                inputMode="decimal"
                                placeholder={isBW ? "BW" : "kg"}
                                value={isBW ? "" : wVal}
                                disabled={isBW}
                                onChange={e => handleWeight(activeDay, ex.name, e.target.value)}
                                style={{
                                  width: 72, background: isBW ? "#111" : "#0d0d0d",
                                  border: `1px solid ${wVal && !isBW ? "#f59e0b66" : isBW ? "#6366f133" : "#2a2a2a"}`,
                                  borderRadius: 6, padding: "6px 10px",
                                  color: isBW ? "#6366f1" : wVal ? "#f59e0b" : "#555",
                                  fontSize: 13, fontFamily: "'Barlow Condensed', sans-serif",
                                  fontWeight: 600, outline: "none", textAlign: "center"
                                }}
                              />
                              <TypeToggle value={exType} onChange={(t) => handleType(activeDay, ex.name, t)} />
                              {ex.cue && (
                                <button onClick={() => setExpandedCue(isExpanded ? null : `${activeDay}||${ex.name}`)} style={{
                                  background: "none", border: "none", cursor: "pointer",
                                  color: "#444", fontSize: 10, padding: 0
                                }}>
                                  {isExpanded ? "▲ cue" : "▼ cue"}
                                </button>
                              )}
                            </div>
                          </div>

                          {isExpanded && ex.cue && (
                            <div style={{ marginTop: 10, padding: "8px 10px", background: "#0d0d0d", borderRadius: 6, borderLeft: `2px solid ${color}`, fontSize: 12, color: "#777", lineHeight: 1.5 }}>
                              {ex.cue}
                            </div>
                          )}

                          <input
                            type="text" placeholder="notes..."
                            value={cVal}
                            onChange={e => handleComment(activeDay, ex.name, e.target.value)}
                            style={{
                              width: "100%", marginTop: 8, background: "#0d0d0d",
                              border: "1px solid #1f1f1f", borderRadius: 6, padding: "6px 10px",
                              color: "#888", fontSize: 12, outline: "none"
                            }}
                          />
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
